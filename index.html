<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starry Memories</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="/src/sparkle-duotone.svg">
</head>
<body>

    <div class="mapa-mental">
        <div class="mapa-contenido">
            <svg id="svg-lineas" width="100%" height="100%"></svg>
        </div>
    </div>

    <div class="controles-inferiores">
        <button id="boton-add-principal" class="boton-neon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#5c72cc" viewBox="0 0 256 256"><path d="M168,56a8,8,0,0,1,8-8h16V32a8,8,0,0,1,16,0V48h16a8,8,0,0,1,0,16H208V80a8,8,0,0,1-16,0V64H176A8,8,0,0,1,168,56Zm62.56,54.68a103.92,103.92,0,1,1-85.24-85.24,8,8,0,0,1-2.64,15.78A88.07,88.07,0,0,0,40,128a87.62,87.62,0,0,0,22.24,58.41A79.66,79.66,0,0,1,98.3,157.66a48,48,0,1,1,59.4,0,79.66,79.66,0,0,1,36.06,28.75A87.62,87.62,0,0,0,216,128a88.85,88.85,0,0,0-1.22-14.68,8,8,0,1,1,15.78-2.64ZM128,152a32,32,0,1,0-32-32A32,32,0,0,0,128,152Zm0,64a87.57,87.57,0,0,0,53.92-18.5,64,64,0,0,0-107.84,0A87.57,87.57,0,0,0,128,216Z"></path></svg>
            Añadir Persona
        </button>
        <button id="boton-anadir-recuerdo" class="boton-neon" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#5c72cc" viewBox="0 0 256 256"><path d="M256,136a8,8,0,0,1-8,8H232v16a8,8,0,0,1-16,0V144H200a8,8,0,0,1,0-16h16V112a8,8,0,0,1,16,0v16h16A8,8,0,0,1,256,136Zm-57.87,58.85a8,8,0,0,1-12.26,10.3C165.75,181.19,138.09,168,108,168s-57.75,13.19-77.87,37.15a8,8,0,0,1-12.25-10.3c14.94-17.78,33.52-30.41,54.17-37.17a68,68,0,1,1,71.9,0C164.6,164.44,183.18,177.07,198.13,194.85ZM108,152a52,52,0,1,0-52-52A52.06,52.06,0,0,0,108,152Z"></path></svg>
            <span class="boton-texto">Añadir Vinculo</span>
        </button>
        <button id="boton-add-secundario" class="boton-neon" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ff006f" viewBox="0 0 256 256"><path d="M223,57a58.07,58.07,0,0,0-81.92-.1L128,69.05,114.91,56.86A58,58,0,0,0,33,139l89.35,90.66a8,8,0,0,0,11.4,0L223,139a58,58,0,0,0,0-82Zm-11.35,70.76L128,212.6,44.3,127.68a42,42,0,0,1,59.4-59.4l.2.2,18.65,17.35a8,8,0,0,0,10.9,0L152.1,68.48l.2-.2a42,42,0,1,1,59.36,59.44Z"></path></svg>
            Añadir Momento
        </button>
    </div>

    <div class="controles-superiores">
        <button id="boton-exportar" class="boton-neon boton-pequeno">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffffff" viewBox="0 0 256 256"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0Zm-101.66,5.66a8,8,0,0,0,11.32,0l40-40a8,8,0,0,0-11.32-11.32L136,124.69V32a8,8,0,0,0-16,0v92.69L93.66,98.34a8,8,0,0,0-11.32,11.32Z"></path></svg>
        </button>
        <button id="boton-importar" class="boton-neon boton-pequeno">
            Importar
        </button>
        <input type="file" id="import-file" accept=".json" style="display: none;"> </div>

    <input type="file" id="input-imagen" accept="image/*" style="display: none;">

    <div id="input-modal-container" class="modal-container hidden">
        <div class="modal-box">
            <h3 id="modal-title">Introduce un nombre</h3>
            <input type="text" id="modal-input" autocomplete="off">
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="modal-btn cancel">Cancelar</button>
                <button id="modal-ok-btn" class="modal-btn ok">Aceptar</button>
            </div>
        </div>
    </div>

    <div id="node-detail-modal-container" class="modal-container hidden">
        <div class="modal-box">
            <h3 id="node-detail-title">Detalle del Nodo</h3>
            <img id="node-detail-image" src="" alt="Imagen del nodo" style="max-width:100%; border-radius:10px; margin: 12px 0;">
            <input type="text" id="node-detail-input" placeholder="Nombre del nodo" autocomplete="off" style="width:100%; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); margin-bottom:12px;">
            <div class="modal-buttons">
                <button id="node-detail-delete-btn" class="modal-btn cancel">Borrar</button>
                <button id="node-detail-save-btn" class="modal-btn ok">Guardar</button>
                <button id="node-detail-close-btn" class="modal-btn ok">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal-container" class="modal-container hidden">
        <div class="modal-box">
            <h3 id="confirm-title">Confirmar eliminación</h3>
            <p id="confirm-message" style="margin: 16px 0; color: #ddd;"></p>
            <div class="modal-buttons">
                <button id="confirm-no-btn" class="modal-btn cancel">Cancelar</button>
                <button id="confirm-yes-btn" class="modal-btn ok">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="message-modal-container" class="modal-container hidden">
        <div class="modal-box">
            <h3 id="message-title">Éxito</h3>
            <p id="message-text" style="margin: 16px 0; color: #ddd;"></p>
            <div class="modal-buttons">
                <button id="message-close-btn" class="modal-btn ok">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
